<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SniperTrader · USME Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fb;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      padding: 2rem 1.5rem 4rem;
      color: #0b1b2b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 1120px;
      width: 100%;
    }

    /* header / brand */
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.2rem;
      flex-wrap: wrap;
      gap: 0.8rem 1.5rem;
    }
    .brand h1 {
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: #0b1b2b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .brand h1 span { color: #0066ff; }
    .brand-tag {
      background: #eef2f6;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #1f3a57;
    }
    .platform-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2.2rem;
      border-bottom: 1px solid #dce3ec;
      padding-bottom: 0.75rem;
    }
    .platform-tab {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 40px;
      color: #4a627a;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .platform-tab:hover { background: #e9eef4; color: #0b1b2b; }
    .platform-tab.active {
      background: #0b1b2b;
      color: white;
    }

    /* two‑card row */
    .plan-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin: 1.8rem 0 2.5rem;
    }
    @media (max-width: 700px) {
      .plan-grid { grid-template-columns: 1fr; gap: 1.5rem; }
    }

    .plan-card {
      background: white;
      border-radius: 28px;
      padding: 2rem 1.8rem 2.2rem;
      box-shadow: 0 8px 28px rgba(0,20,40,0.06);
      border: 1px solid #e8edf4;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }
    .plan-card:hover {
      border-color: #b6ccff;
      box-shadow: 0 12px 32px rgba(0,60,180,0.08);
    }
    .plan-card .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #eef4ff;
      color: #0066ff;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      align-self: flex-start;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .plan-card .badge.gold {
      background: #fef2d6;
      color: #b2700a;
    }
    .plan-name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .plan-price {
      font-size: 2.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #0b1b2b;
      margin: 0.4rem 0 0.2rem;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .plan-price small {
      font-size: 1rem;
      font-weight: 500;
      color: #4f6b86;
    }
    .plan-desc {
      color: #2e4a67;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
    }
    .feature-list {
      list-style: none;
      margin: 1rem 0 1.6rem;
      flex: 1;
    }
    .feature-list li {
      padding: 0.35rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #1b344d;
    }
    .feature-list li::before {
      content: "✓";
      color: #0066ff;
      font-weight: 700;
      font-size: 1rem;
    }
    .btn-primary {
      background: #0b1b2b;
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      color: white;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Inter', sans-serif;
      margin-top: 0.5rem;
      width: 100%;
      text-align: center;
    }
    .btn-primary:hover { background: #1e3450; transform: scale(1.01); }
    .btn-primary.outline {
      background: transparent;
      color: #0b1b2b;
      border: 1px solid #cbd7e6;
    }
    .btn-primary.outline:hover { background: #f0f4fa; border-color: #8aa3c0; }

    .platform-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #5b7a97;
      margin-bottom: 0.2rem;
    }

    /* cart summary – minimal */
    .cart-mini {
      margin-top: 2.8rem;
      background: white;
      border-radius: 40px;
      padding: 1.2rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #dce3ec;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      gap: 1rem 1.5rem;
    }
    .cart-mini .items {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.9rem;
    }
    .cart-mini .items .item-pill {
      background: #f0f4fa;
      padding: 0.2rem 1rem 0.2rem 1.2rem;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cart-mini .items .item-pill button {
      background: none;
      border: none;
      color: #8f9fb2;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
    }
    .cart-mini .items .item-pill button:hover { color: #cc2233; }
    .cart-total {
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
    }
    .checkout-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .btn-checkout {
      background: #0066ff;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      font-weight: 700;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-checkout:hover { background: #004fd1; transform: scale(1.02); }
    .btn-checkout:disabled { opacity: 0.4; pointer-events: none; }

    .crypto-toggle {
      background: #f0f4fa;
      border: 1px solid #d0dcec;
      border-radius: 40px;
      padding: 0.3rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      font-family: 'Inter', sans-serif;
      color: #1f3a57;
    }
    .crypto-toggle.active {
      background: #0b1b2b;
      border-color: #0b1b2b;
      color: white;
    }
    .crypto-addr {
      background: #f5f8fc;
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-family: monospace;
      border: 1px dashed #b0c8e0;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .crypto-addr button {
      background: none;
      border: none;
      font-weight: 600;
      color: #0066ff;
      cursor: pointer;
      font-size: 0.7rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0b1b2b;
      color: white;
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 999;
      transition: opacity 0.25s;
    }

    .footnote {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #6a85a0;
      border-top: 1px solid #dce3ec;
      padding-top: 2rem;
    }
  </style>
</head>
<body>
<div class="container" id="app">

  <!-- brand -->
  <div class="brand">
    <h1>⚡ Sniper<span>Trader</span>.ai</h1>
    <div class="brand-tag">USME · Pivot Suite</div>
  </div>

  <!-- platform tabs -->
  <div class="platform-tabs" id="platformTabs">
    <button class="platform-tab active" data-platform="thinkscript">📊 thinkorswim</button>
    <button class="platform-tab" data-platform="pinescript">📈 TradingView</button>
    <button class="platform-tab" data-platform="ninjascript">⚙️ NinjaTrader</button>
  </div>

  <!-- dynamic plan cards -->
  <div class="plan-grid" id="planGrid">
    <!-- rendered by JS -->
  </div>

  <!-- minimal cart -->
  <div class="cart-mini" id="cartMini">
    <div class="items" id="cartItems">
      <span style="color:#4f6b86;">Cart</span>
      <span id="emptyCartMsg" style="color:#8aa0b8;">empty</span>
    </div>
    <div class="checkout-actions">
      <span class="cart-total" id="cartTotal">$0</span>
      <button class="crypto-toggle" id="cryptoToggle">₿ Crypto</button>
      <button class="btn-checkout" id="checkoutBtn">Checkout →</button>
    </div>
  </div>

  <!-- crypto panel (hidden by default) -->
  <div id="cryptoPanel" style="display:none; margin-top:0.8rem; background:#f0f6fe; border-radius:60px; padding:0.5rem 1.5rem; border:1px solid #c0d6f0; align-items:center; gap:1rem; flex-wrap:wrap; justify-content:center;">
    <span style="font-weight:500; font-size:0.85rem;">⚡ SNIPER Treasury</span>
    <span class="crypto-addr">0x3A7F...cE9bD2F1aE <button id="copyAddrBtn">copy</button></span>
    <button id="simulateCryptoBtn" style="background:#0b1b2b; border:none; border-radius:60px; color:white; padding:0.3rem 1.2rem; font-weight:600; cursor:pointer;">Simulate payment</button>
  </div>

  <div class="footnote">SSL encrypted · Crypto (BTC/ETH/USDC) · Instant delivery</div>
</div>

<script>
  (function() {
    // ---------- DATA ----------
    const platformMap = {
      thinkscript: { label: 'thinkorswim', script: 'ThinkScript' },
      pinescript:  { label: 'TradingView', script: 'PineScript' },
      ninjascript: { label: 'NinjaTrader', script: 'NinjaScript' }
    };

    // product catalog: monthly & annual
    const productCatalog = {
      thinkscript: {
        monthly: { name: 'NoRepainting Pivot · Monthly', price: 79, script: 'ThinkScript' },
        annual:  { name: 'NoRepainting Pivot · Annual', price: 599, script: 'ThinkScript' }
      },
      pinescript: {
        monthly: { name: 'NoRepainting Pivot · Monthly', price: 79, script: 'PineScript' },
        annual:  { name: 'NoRepainting Pivot · Annual', price: 599, script: 'PineScript' }
      },
      ninjascript: {
        monthly: { name: 'NoRepainting Pivot · Monthly', price: 79, script: 'NinjaScript' },
        annual:  { name: 'NoRepainting Pivot · Annual', price: 599, script: 'NinjaScript' }
      }
    };

    // additional standalone (always shown)
    const extras = [
      { id: 'psych', name: 'TraderEdge Psych App', monthlyPrice: 29, annualPrice: 249 },
      { id: 'ebook', name: 'From Broke to Funded eBook', oneTime: 19 }
    ];

    // ---------- STATE ----------
    let currentPlatform = 'thinkscript';
    let cart = [];

    // DOM refs
    const planGrid = document.getElementById('planGrid');
    const cartItems = document.getElementById('cartItems');
    const emptyCartMsg = document.getElementById('emptyCartMsg');
    const cartTotalSpan = document.getElementById('cartTotal');
    const cryptoPanel = document.getElementById('cryptoPanel');
    const cryptoToggle = document.getElementById('cryptoToggle');
    let cryptoVisible = false;

    // ---------- HELPERS ----------
    function renderPlans(platformKey) {
      const monthly = productCatalog[platformKey].monthly;
      const annual = productCatalog[platformKey].annual;
      const scriptLabel = platformMap[platformKey].script;

      // build two columns
      const monthlyFeatures = [
        '2‑Week Free Trial',
        'USME NoRepaint Pivot',
        'Elite/Prime/Standard Scoring',
        'Full 6‑module course',
        'Divergence scanner',
        `${scriptLabel} script included`,
        'Community + trade examples'
      ];
      const annualFeatures = [
        '2‑Week Free Trial',
        'All monthly features',
        '2 months free vs monthly',
        'Priority support',
        'Lifetime course access',
        'Annual strategy playbooks',
        `Save 37% vs monthly`
      ];

      const html = `
        <div class="plan-card">
          <div class="badge">monthly</div>
          <div class="plan-name">Full Pivot Suite</div>
          <div class="plan-price">$${monthly.price} <small>/ month</small></div>
          <div class="plan-desc">cancel anytime · 2‑week trial</div>
          <ul class="feature-list">
            ${monthlyFeatures.map(f => `<li>${f}</li>`).join('')}
          </ul>
          <button class="btn-primary" data-plan="monthly" data-platform="${platformKey}">Start Free Trial →</button>
        </div>

        <div class="plan-card">
          <div class="badge gold">annual · save 37%</div>
          <div class="plan-name">Annual Pivot Suite</div>
          <div class="plan-price">$${annual.price} <small>/ year</small></div>
          <div class="plan-desc">billed yearly · 2‑week trial</div>
          <ul class="feature-list">
            ${annualFeatures.map(f => `<li>${f}</li>`).join('')}
          </ul>
          <button class="btn-primary" data-plan="annual" data-platform="${platformKey}">Start Yearly Trial →</button>
        </div>
      `;
      planGrid.innerHTML = html;

      // attach listeners for these two plan buttons
      document.querySelectorAll('#planGrid .btn-primary').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const plan = this.dataset.plan; // 'monthly' or 'annual'
          const platform = this.dataset.platform;
          const product = productCatalog[platform][plan];
          if (product) {
            addToCart(product.name, product.price);
          } else {
            // fallback
            addToCart(`Pivot Suite (${platform})`, plan === 'annual' ? 599 : 79);
          }
        });
      });
    }

    function addToCart(name, price) {
      // avoid duplicates? we allow multiple
      cart.push({ name, price: Number(price) });
      updateCartUI();
      showToast(`✓ ${name} added`);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCartUI();
    }

    function updateCartUI() {
      const total = cart.reduce((sum, item) => sum + item.price, 0);
      cartTotalSpan.textContent = `$${total}`;

      if (cart.length === 0) {
        emptyCartMsg.style.display = 'inline';
        // clear items
        const pills = cartItems.querySelectorAll('.item-pill');
        pills.forEach(p => p.remove());
        return;
      }
      emptyCartMsg.style.display = 'none';
      // rebuild pills
      const oldPills = cartItems.querySelectorAll('.item-pill');
      oldPills.forEach(p => p.remove());

      cart.forEach((item, idx) => {
        const pill = document.createElement('span');
        pill.className = 'item-pill';
        pill.innerHTML = `${item.name} $${item.price} <button data-idx="${idx}">✕</button>`;
        cartItems.appendChild(pill);
      });

      // attach remove events
      cartItems.querySelectorAll('.item-pill button').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const idx = parseInt(this.dataset.idx);
          if (!isNaN(idx)) removeFromCart(idx);
        });
      });
    }

    function showToast(msg) {
      const old = document.querySelector('.toast');
      if (old) old.remove();
      const div = document.createElement('div');
      div.className = 'toast';
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    // ---------- PLATFORM TABS ----------
    document.querySelectorAll('.platform-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentPlatform = this.dataset.platform;
        renderPlans(currentPlatform);
      });
    });

    // ---------- CRYPTO TOGGLE ----------
    cryptoToggle.addEventListener('click', function() {
      cryptoVisible = !cryptoVisible;
      cryptoPanel.style.display = cryptoVisible ? 'flex' : 'none';
      this.classList.toggle('active', cryptoVisible);
    });

    // copy address
    document.getElementById('copyAddrBtn')?.addEventListener('click', function() {
      const addr = '0x3A7F...cE9bD2F1aE';
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(addr).then(() => showToast('Address copied')).catch(() => alert(addr));
      } else {
        alert(addr);
      }
    });

    // simulate crypto payment
    document.getElementById('simulateCryptoBtn')?.addEventListener('click', function() {
      if (cart.length === 0) { showToast('Cart empty'); return; }
      const total = cart.reduce((s, i) => s + i.price, 0);
      showToast(`✅ Crypto payment $${total} simulated · licenses activated`);
      cart = [];
      updateCartUI();
      cryptoPanel.style.display = 'none';
      cryptoToggle.classList.remove('active');
      cryptoVisible = false;
    });

    // ---------- CHECKOUT ----------
    document.getElementById('checkoutBtn')?.addEventListener('click', function() {
      if (cart.length === 0) { showToast('Add items first'); return; }
      const total = cart.reduce((s, i) => s + i.price, 0);
      if (cryptoVisible) {
        showToast(`🔐 Crypto checkout: $${total} · send to treasury address`);
      } else {
        showToast(`🚀 Order total $${total} · licenses delivered instantly`);
        cart = [];
        updateCartUI();
      }
    });

    // ---------- INIT ----------
    renderPlans('thinkscript');
    updateCartUI();

    // extra: quick add from anything (legacy) – we already have plan buttons.
    // also handle extra standalone items? we could add but spec wants simple.
    // add hidden extras? we keep just the two plan cards per platform.
  })();
</script>

</body>
</html>
