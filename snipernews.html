<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SniperTrader.ai — Institutional-grade news trading execution platform with cross-asset order flow analysis">
<meta name="theme-color" content="#020508">
<title>SniperTrader.ai — Institutional News Execution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #020508;
    --bg-secondary: #060d14;
    --bg-panel: #080f18;
    --bg-card: #0a1520;
    --accent-cyan: #00d4ff;
    --accent-gold: #ffc300;
    --accent-red: #ff2442;
    --accent-green: #00ff88;
    --accent-orange: #ff6b1a;
    --text-primary: #e8f4ff;
    --text-secondary: #7a9db8;
    --text-muted: #3a5570;
    --border-subtle: rgba(0,212,255,0.08);
    --border-glow: rgba(0,212,255,0.25);
    --grid-line: rgba(0,212,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(0,100,180,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Skip navigation link for accessibility */
  .skip-nav {
    position: absolute;
    top: -100%;
    left: 16px;
    z-index: 1000;
    background: var(--accent-cyan);
    color: #000;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    text-decoration: none;
    transition: top 0.2s;
  }
  .skip-nav:focus { top: 8px; }

  /* ===== HEADER ===== */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border-glow);
    background: rgba(2,5,8,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    position: relative;
  }

  .logo-mark svg { width: 100%; height: 100%; }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-primary);
  }

  .logo-text span { color: var(--accent-cyan); }

  .logo-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--accent-gold);
    background: rgba(255,195,0,0.08);
    border: 1px solid rgba(255,195,0,0.2);
    padding: 2px 7px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .header-center {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent-green);
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: livePulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent-green);
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .header-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent-cyan);
    letter-spacing: 0.1em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 4px 10px;
    border-radius: 2px;
    user-select: none;
  }

  .status-pill.armed {
    background: rgba(255,36,66,0.1);
    border: 1px solid rgba(255,36,66,0.3);
    color: var(--accent-red);
  }

  .status-pill.scanning {
    background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent-cyan);
  }

  /* ===== TICKER TAPE ===== */
  .ticker-bar {
    position: relative;
    z-index: 9;
    height: 32px;
    background: rgba(6,13,20,0.95);
    border-bottom: 1px solid var(--border-subtle);
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .ticker-label {
    flex-shrink: 0;
    padding: 0 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent-gold);
    background: rgba(255,195,0,0.06);
    border-right: 1px solid rgba(255,195,0,0.2);
    height: 100%;
    display: flex;
    align-items: center;
    z-index: 1;
  }

  .ticker-scroll {
    flex: 1;
    overflow: hidden;
  }

  .ticker-track {
    display: flex;
    gap: 0;
    animation: tickerScroll 40s linear infinite;
    white-space: nowrap;
    will-change: transform;
  }

  /* Pause ticker on hover */
  .ticker-bar:hover .ticker-track {
    animation-play-state: paused;
  }

  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    border-right: 1px solid var(--border-subtle);
  }

  .ticker-item .sym { color: var(--text-secondary); }
  .ticker-item .val { color: var(--text-primary); }
  .ticker-item .chg.up { color: var(--accent-green); }
  .ticker-item .chg.dn { color: var(--accent-red); }

  /* ===== MAIN LAYOUT ===== */
  .main-layout {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    grid-template-rows: auto 1fr auto;
    height: calc(100vh - 88px);
    overflow: hidden;
  }

  /* ===== COUNTDOWN BANNER ===== */
  .countdown-banner {
    grid-column: 1 / -1;
    background: linear-gradient(90deg,
      rgba(255,36,66,0.03) 0%,
      rgba(255,36,66,0.08) 50%,
      rgba(255,36,66,0.03) 100%);
    border-bottom: 1px solid rgba(255,36,66,0.2);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .next-event-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent-red);
    text-transform: uppercase;
  }

  .next-event-name {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.05em;
  }

  .impact-bar {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .impact-dot {
    width: 8px;
    height: 8px;
    border-radius: 1px;
    background: rgba(255,36,66,0.2);
    border: 1px solid rgba(255,36,66,0.4);
  }

  .impact-dot.filled { background: var(--accent-red); border-color: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }

  .countdown-digits {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent-red);
    text-shadow: 0 0 20px rgba(255,36,66,0.5);
    letter-spacing: 0.05em;
  }

  .countdown-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .countdown-sep {
    font-size: 18px;
    opacity: 0.5;
    animation: sepBlink 1s step-end infinite;
  }

  @keyframes sepBlink { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.1; } }

  .banner-models {
    margin-left: auto;
    display: flex;
    gap: 10px;
  }

  .model-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .model-tag.active {
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent-cyan);
  }

  .model-tag.standby {
    background: rgba(255,195,0,0.06);
    border: 1px solid rgba(255,195,0,0.2);
    color: var(--accent-gold);
  }

  /* ===== LEFT PANEL ===== */
  .panel-left {
    border-right: 1px solid var(--border-subtle);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
    background: rgba(8,15,24,0.6);
  }

  .panel-left::-webkit-scrollbar { width: 4px; }
  .panel-left::-webkit-scrollbar-track { background: transparent; }
  .panel-left::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(8,15,24,0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 2;
  }

  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
  }

  .event-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .event-list { padding: 8px 0; }

  .event-item {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(0,212,255,0.03);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .event-item:hover { background: rgba(0,212,255,0.04); }

  .event-item.high-impact {
    border-left: 2px solid var(--accent-red);
  }

  .event-item.med-impact {
    border-left: 2px solid var(--accent-orange);
  }

  .event-item.selected {
    background: rgba(0,212,255,0.06);
    border-left: 2px solid var(--accent-cyan);
  }

  .event-item-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .event-item-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }

  .event-item-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .event-currency {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent-cyan);
    letter-spacing: 0.08em;
  }

  .event-impact-dots {
    display: flex;
    gap: 2px;
  }

  .sm-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .sm-dot.red { background: var(--accent-red); }
  .sm-dot.empty { background: var(--text-muted); opacity: 0.3; }

  .forecast-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }

  .forecast-row span { color: var(--text-secondary); }

  /* ===== CENTER PANEL ===== */
  .panel-center {
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .panel-center::-webkit-scrollbar { width: 4px; }
  .panel-center::-webkit-scrollbar-track { background: transparent; }
  .panel-center::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

  /* ===== MODEL SECTION ===== */
  .model-section {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    overflow: hidden;
  }

  .model-section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,212,255,0.02);
  }

  .model-section-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .model-number {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-cyan);
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  .model-name {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.05em;
  }

  .model-status-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 3px 10px;
    border-radius: 2px;
  }

  .model-status-badge.armed {
    background: rgba(255,36,66,0.1);
    border: 1px solid rgba(255,36,66,0.35);
    color: var(--accent-red);
    animation: badgePulse 2s ease-in-out infinite;
  }

  .model-status-badge.analyzing {
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.25);
    color: var(--accent-cyan);
  }

  @keyframes badgePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .model-body { padding: 16px; }

  .model-description {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .model-description strong {
    color: var(--accent-cyan);
    font-weight: 600;
  }

  /* ===== METRICS GRID ===== */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .metric-cell {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }

  .metric-cell::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent-cyan);
    opacity: 0.3;
  }

  .metric-cell.gold::before { background: var(--accent-gold); }
  .metric-cell.green::before { background: var(--accent-green); }
  .metric-cell.red::before { background: var(--accent-red); }

  .metric-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .metric-value {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }

  .metric-value.cyan { color: var(--accent-cyan); }
  .metric-value.gold { color: var(--accent-gold); }
  .metric-value.green { color: var(--accent-green); }
  .metric-value.red { color: var(--accent-red); }

  .metric-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ===== ASSET MATRIX ===== */
  .asset-matrix {
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .matrix-row {
    display: grid;
    grid-template-columns: 100px 1fr 80px 80px 80px;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(0,212,255,0.03);
    gap: 8px;
  }

  .matrix-row.header {
    background: rgba(0,212,255,0.03);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }

  .matrix-row:last-child { border-bottom: none; }
  .matrix-row:hover { background: rgba(0,212,255,0.03); }

  .asset-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent-cyan);
    letter-spacing: 0.06em;
  }

  .imbalance-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .imbalance-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
    position: relative;
  }

  .imbalance-bar.buy { background: linear-gradient(90deg, var(--accent-green), rgba(0,255,136,0.5)); }
  .imbalance-bar.sell { background: linear-gradient(90deg, var(--accent-red), rgba(255,36,66,0.5)); }

  .asset-flow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    text-align: right;
  }

  .asset-flow.buy-flow { color: var(--accent-green); }
  .asset-flow.sell-flow { color: var(--accent-red); }

  .asset-spread {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    text-align: right;
  }

  .signal-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 7px;
    border-radius: 2px;
    text-align: center;
    text-transform: uppercase;
  }

  .signal-chip.long {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.25);
    color: var(--accent-green);
  }

  .signal-chip.short {
    background: rgba(255,36,66,0.1);
    border: 1px solid rgba(255,36,66,0.25);
    color: var(--accent-red);
  }

  .signal-chip.neutral {
    background: rgba(122,157,184,0.06);
    border: 1px solid rgba(122,157,184,0.15);
    color: var(--text-secondary);
  }

  /* ===== STRADDLE MODEL ===== */
  .straddle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .straddle-side {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    padding: 12px;
  }

  .straddle-side.buy-side {
    border-top: 2px solid rgba(0,255,136,0.4);
  }

  .straddle-side.sell-side {
    border-top: 2px solid rgba(255,36,66,0.4);
  }

  .straddle-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }

  .straddle-label.buy { color: var(--accent-green); }
  .straddle-label.sell { color: var(--accent-red); }

  .limit-levels {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .limit-level {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
    border-left: 2px solid transparent;
  }

  .limit-level.l1 { border-left-color: rgba(0,255,136,0.8); }
  .limit-level.l2 { border-left-color: rgba(0,255,136,0.5); }
  .limit-level.l3 { border-left-color: rgba(0,255,136,0.25); }
  .limit-level.s1 { border-left-color: rgba(255,36,66,0.8); }
  .limit-level.s2 { border-left-color: rgba(255,36,66,0.5); }
  .limit-level.s3 { border-left-color: rgba(255,36,66,0.25); }

  .level-price {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
    font-weight: 500;
  }

  .level-size {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .level-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
  }

  .level-status.armed { color: var(--accent-gold); }
  .level-status.filled { color: var(--accent-green); }
  .level-status.pending { color: var(--text-muted); }

  /* ===== EXECUTION LOG ===== */
  .exec-log {
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    overflow: hidden;
  }

  .exec-log-header {
    background: rgba(0,212,255,0.03);
    padding: 8px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-entries {
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }

  .log-entries::-webkit-scrollbar { width: 3px; }
  .log-entries::-webkit-scrollbar-track { background: transparent; }
  .log-entries::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

  .log-entry {
    display: flex;
    gap: 12px;
    padding: 6px 12px;
    border-bottom: 1px solid rgba(0,212,255,0.02);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    align-items: center;
    animation: logFadeIn 0.4s ease;
  }

  @keyframes logFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-time { color: var(--text-muted); min-width: 55px; }
  .log-type {
    min-width: 60px;
    padding: 1px 5px;
    border-radius: 1px;
    text-align: center;
    letter-spacing: 0.08em;
  }

  .log-type.sweep { background: rgba(255,36,66,0.1); color: var(--accent-red); border: 1px solid rgba(255,36,66,0.2); }
  .log-type.fill { background: rgba(0,255,136,0.1); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); }
  .log-type.delta { background: rgba(0,212,255,0.08); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.2); }
  .log-type.abort { background: rgba(255,107,26,0.1); color: var(--accent-orange); border: 1px solid rgba(255,107,26,0.2); }

  .log-msg { color: var(--text-secondary); flex: 1; }
  .log-pnl { min-width: 60px; text-align: right; }
  .log-pnl.pos { color: var(--accent-green); }
  .log-pnl.neg { color: var(--accent-red); }

  /* ===== RIGHT PANEL ===== */
  .panel-right {
    border-left: 1px solid var(--border-subtle);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
    background: rgba(8,15,24,0.6);
    display: flex;
    flex-direction: column;
  }

  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-track { background: transparent; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

  /* ===== VOLATILITY GAUGE ===== */
  .vol-gauge-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .gauge-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .gauge-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .gauge-sym {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    min-width: 50px;
    letter-spacing: 0.06em;
  }

  .gauge-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    overflow: hidden;
  }

  .gauge-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-gold));
    transition: width 1s ease;
    position: relative;
  }

  .gauge-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -1px;
    width: 3px;
    height: 8px;
    background: white;
    border-radius: 1px;
    opacity: 0.8;
  }

  .gauge-pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent-gold);
    min-width: 32px;
    text-align: right;
  }

  /* ===== CORRELATION MATRIX ===== */
  .correlation-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .corr-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 3px;
  }

  .corr-cell {
    aspect-ratio: 1;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .corr-cell:hover { transform: scale(1.1); }
